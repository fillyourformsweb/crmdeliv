{% extends "base.html" %}

{% block title %}Add Branch - CRM Delivery{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2><i class="fas fa-plus"></i> Add Branch</h2>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Branch Name *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Branch Code *</label>
                    <input type="text" name="code" class="form-control" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control" rows="2"></textarea>
            </div>

            <hr class="my-4">
            <h4 class="mb-3"><i class="fas fa-user-shield"></i> Branch Administrator Setup</h4>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Admin Username *</label>
                    <input type="text" name="admin_username" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Admin Email *</label>
                    <input type="email" name="admin_email" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Admin Password *</label>
                    <input type="password" name="admin_password" class="form-control" required>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save
                </button>
                <a href="{{ url_for('branches') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
