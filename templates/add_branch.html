{% extends "base.html" %}

{% block title %}Add Branch - CRM Delivery{% endblock %}

{% block content %}
<div class="fitted-page-container">
    <div class="row mb-3 align-items-center">
        <div class="col-8">
            <h2 class="fw-black text-dark mb-0"><i class="fas fa-plus me-2 text-primary"></i>Add Branch</h2>
        </div>
        <div class="col-4 text-end">
            <a href="{{ url_for('branches') }}" class="btn btn-light border px-3 py-1 small">
                <i class="fas fa-arrow-left me-1"></i>Back
            </a>
        </div>
    </div>

    <div class="card fitted-card">
        <div class="card-body p-3">
            <form method="POST" class="fitted-form">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Branch Name *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Branch Code *</label>
                    <input type="text" name="code" class="form-control" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control" rows="2"></textarea>
            </div>

            <hr class="my-4">
            <h4 class="mb-2"><i class="fas fa-user-shield"></i> Branch Administrator Setup</h4>
            <p class="text-muted small mb-3">Optional: Create a branch manager now, or leave blank and add one later through Staff Management</p>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Admin Username</label>
                    <input type="text" name="admin_username" class="form-control" placeholder="Optional">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Admin Email</label>
                    <input type="email" name="admin_email" class="form-control" placeholder="Optional">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Admin Password</label>
                    <input type="password" name="admin_password" class="form-control" placeholder="Optional">
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4 py-2 fw-bold">
                    <i class="fas fa-save me-2"></i>Save Branch
                </button>
                <a href="{{ url_for('branches') }}" class="btn btn-light border px-4 py-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
