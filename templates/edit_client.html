{% extends "base.html" %}

{% block title %}Edit Corporate Client - {{ client.name }}{% endblock %}

{% block content %}
<div class="fitted-page-container">
    <div class="row mb-3 align-items-center">
        <div class="col-md-8">
            <h5 class="text-primary fw-bold mb-0" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Corporate Relations</h5>
            <h2 class="fw-black text-dark mb-0">Edit Client: {{ client.name }}</h2>
        </div>
        <div class="col-md-4 text-md-end">
            <div class="btn-group shadow-sm rounded-pill overflow-hidden">
                <a href="{{ url_for('clients') }}" class="btn btn-light border-0 px-3 py-1 small">
                    <i class="fas fa-arrow-left me-2"></i>Back
                </a>
                <a href="{{ url_for('view_client_prices', client_id=client.id) }}" class="btn btn-primary px-3 py-1 small">
                    <i class="fas fa-tags me-2"></i>Prices
                </a>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-12">
            <form method="POST" class="fitted-form">
                <div class="card fitted-card mb-4">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Client Name</label>
                                <input type="text" name="name" class="form-control" value="{{ client.name }}" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Company Name</label>
                                <input type="text" name="company_name" class="form-control" value="{{ client.company_name or '' }}">
                            </div>

                            <div class="col-md-6 mb-2">
                                <label class="form-label">Phone</label>
                                <input type="text" name="phone" class="form-control" value="{{ client.phone }}" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Alt Phone</label>
                                <input type="text" name="alt_phone" class="form-control" value="{{ client.alt_phone or '' }}">
                            </div>

                            <div class="col-md-6 mb-2">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" value="{{ client.email or '' }}">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Alt Email</label>
                                <input type="email" name="alt_email" class="form-control" value="{{ client.alt_email or '' }}">
                            </div>

                            <div class="col-md-6 mb-2">
                                <label class="form-label">Address</label>
                                <textarea name="address" class="form-control" rows="2">{{ client.address or '' }}</textarea>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Alt Address</label>
                                <textarea name="alt_address" class="form-control" rows="2">{{ client.alt_address or '' }}</textarea>
                            </div>

                            <div class="col-md-4 mb-2">
                                <label class="form-label">GST Number</label>
                                <input type="text" name="gst_number" class="form-control" value="{{ client.gst_number or '' }}">
                            </div>
                            <div class="col-md-4 mb-2">
                                <label class="form-label">Billing Pattern</label>
                                <select name="billing_pattern_id" class="form-select">
                                    <option value="">-- Select --</option>
                                    {% for pattern in patterns %}
                                    <option value="{{ pattern.id }}" {% if client.billing_pattern_id == pattern.id %}selected{% endif %}>
                                        {{ pattern.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4 mb-2">
                                <label class="form-label">Billing Date</label>
                                <input type="number" name="billing_date" class="form-control" value="{{ client.billing_date or '' }}" min="1" max="31">
                            </div>

                            <div class="col-12 mt-2">
                                <div class="form-check form-switch p-2 bg-light rounded-3 d-flex align-items-center">
                                    <input class="form-check-input ms-0 me-3" type="checkbox" name="is_active" id="isActive" {{ 'checked' if client.is_active }}>
                                    <div>
                                        <label class="form-check-label fw-bold text-dark mb-0" for="isActive">Account Active</label>
                                        <div class="small text-muted" style="font-size: 0.7rem;">Inactive clients cannot place new orders.</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4 text-end">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fas fa-save me-2"></i>Update Profile
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
