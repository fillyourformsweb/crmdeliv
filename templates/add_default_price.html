{% extends "base.html" %}

{% block title %}Add State Price - Pricing Master{% endblock %}

{% block content %}
<div class="row mb-5 align-items-center">
    <div class="col-md-8">
        <h5 class="text-primary fw-bold mb-1">Pricing Configuration</h5>
        <h1 class="display-5 fw-black text-dark mb-2">New Delivery Zone</h1>
        <p class="text-muted fs-5 mb-0">Define standard rates for a new state or territory.</p>
    </div>
    <div class="col-md-4 text-md-end">
        <a href="{{ url_for('default_prices') }}" class="luxury-btn btn btn-light border px-4">
            <i class="fas fa-arrow-left me-2"></i>Back to Matrix
        </a>
    </div>
</div>

<div class="row justify-content-center page-reveal">
    <div class="col-lg-10">
        <form method="POST">
            <div class="card luxury-card border-0 shadow-sm overflow-hidden mb-5">
                <div class="card-header bg-transparent border-0 px-4 pt-4">
                    <h5 class="fw-bold mb-0 text-dark"><i
                            class="fas fa-plus-circle me-2 text-primary opacity-50"></i>State Rate Definition</h5>
                </div>
                <div class="card-body p-4">
                    <div class="row g-4">
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase text-muted">Destination State
                                Name</label>
                            <input type="text" class="form-control luxury-input" name="state"
                                placeholder="e.g. Maharashtra" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">100gm Rate (₹)</label>
                            <input type="number" step="0.01" class="form-control luxury-input" name="price_100gm"
                                value="0.00" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">250gm Rate (₹)</label>
                            <input type="number" step="0.01" class="form-control luxury-input" name="price_250gm"
                                value="0.00" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">500gm Rate (₹)</label>
                            <input type="number" step="0.01" class="form-control luxury-input" name="price_500gm"
                                value="0.00" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">1kg Standard (₹)</label>
                            <input type="number" step="0.01" class="form-control luxury-input" name="price_1kg"
                                value="0.00" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">2kg Parcel (₹)</label>
                            <input type="number" step="0.01" class="form-control luxury-input" name="price_2kg"
                                value="0.00" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">3kg Bulk (₹)</label>
                            <input type="number" step="0.01" class="form-control luxury-input" name="price_3kg"
                                value="0.00" required>
                        </div>
                    </div>
                </div>
                <div class="card-footer bg-light border-0 p-4 text-end">
                    <button type="submit" class="luxury-btn btn btn-primary px-5 py-2 fw-bold rounded-pill">
                        <i class="fas fa-check-circle me-2"></i>Initialize Zone Rates
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
