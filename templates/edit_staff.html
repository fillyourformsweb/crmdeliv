{% extends "base.html" %}

{% block title %}Edit Staff - CRM Delivery{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2><i class="fas fa-user-edit"></i> Edit Staff Member: {{ user.username }}</h2>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Username *</label>
                    <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">New Password (leave blank to keep current)</label>
                    <input type="password" name="password" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Role *</label>
                    <select name="role" class="form-select" required>
                        <option value="admin" {{ 'selected' if user.role=='admin' else '' }}>Admin</option>
                        <option value="manager" {{ 'selected' if user.role=='manager' else '' }}>Manager</option>
                        <option value="operation_manager" {{ 'selected' if user.role=='operation_manager' else '' }}>Operation Manager</option>
                        <option value="marketing_manager" {{ 'selected' if user.role=='marketing_manager' else '' }}>Marketing Manager</option>
                        <option value="staff" {{ 'selected' if user.role=='staff' else '' }}>Staff</option>
                        <option value="delivery" {{ 'selected' if user.role=='delivery' else '' }}>Delivery</option>
                        <option value="delivery_pickup" {{ 'selected' if user.role=='delivery_pickup' else '' }}>Delivery & Pickup</option>
                        <option value="marketing_office" {{ 'selected' if user.role=='marketing_office' else '' }}>Marketing Office</option>
                        <option value="branch" {{ 'selected' if user.role=='branch' else '' }}>Branch</option>
                        <option value="franchise" {{ 'selected' if user.role=='franchise' else '' }}>Franchise</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Branch</label>
                    <select name="branch_id" class="form-select">
                        <option value="">Select Branch</option>
                        {% for branch in branches %}
                        <option value="{{ branch.id }}" {{ 'selected' if user.branch_id==branch.id else '' }}>{{
                            branch.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control" rows="2">{{ user.address or '' }}</textarea>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {{ 'checked' if
                    user.is_active else '' }}>
                <label class="form-check-label" for="isActive">Active</label>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{{ url_for('staff_management') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
