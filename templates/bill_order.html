{% extends "base.html" %}

{% block title %}Bill Order - Single Order Billing{% endblock %}

{% block extra_css %}
<style>
    .bill-order-container {
        max-width: 1200px;
        margin: 0 auto;
    }

    .search-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .search-card h2 {
        font-weight: 700;
        margin-bottom: 20px;
    }

    .search-filters {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
    }

    .search-filters input,
    .search-filters select {
        background: rgba(255, 255, 255, 0.95) !important;
        border: none !important;
        border-radius: 8px;
        padding: 12px 15px;
        font-size: 0.95rem;
        color: #333;
    }

    .search-filters input::placeholder {
        color: #999;
    }

    .btn-search {
        background: white !important;
        color: #667eea !important;
        border: none;
        border-radius: 8px;
        padding: 12px 30px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-search:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        background: #f0f0f0 !important;
    }

    .orders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 30px;
    }

    .order-card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
        border-left: 5px solid #667eea;
    }

    .order-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .order-card-header {
        background: #f8f9fa;
        padding: 15px;
        border-bottom: 1px solid #e9ecef;
    }

    .order-card-header h5 {
        margin: 0;
        font-weight: 600;
        color: #333;
        font-size: 1.1rem;
    }

    .order-card-header .text-muted {
        font-size: 0.85rem;
        margin-top: 5px;
    }

    .order-card-body {
        padding: 15px;
    }

    .order-detail {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 0.95rem;
    }

    .order-detail:last-child {
        margin-bottom: 0;
    }

    .detail-label {
        color: #666;
        font-weight: 500;
    }

    .detail-value {
        color: #333;
        font-weight: 600;
    }

    .amount-row {
        border-top: 1px solid #e9ecef;
        margin-top: 12px;
        padding-top: 12px;
    }

    .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
    }

    .status-paid {
        background: #d4edda;
        color: #155724;
    }

    .status-unpaid {
        background: #f8d7da;
        color: #721c24;
    }

    .status-partial {
        background: #fff3cd;
        color: #856404;
    }

    .order-card-footer {
        padding: 15px;
        border-top: 1px solid #e9ecef;
        display: flex;
        gap: 10px;
    }

    .btn-bill {
        flex: 1;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-bill:hover {
        background: #764ba2;
        transform: translateY(-2px);
    }

    .no-results {
        text-align: center;
        padding: 60px 20px;
        color: #999;
    }

    .no-results i {
        font-size: 4rem;
        margin-bottom: 20px;
        opacity: 0.5;
    }

    .loading {
        text-align: center;
        padding: 40px;
    }

    .spinner-border {
        color: #667eea;
    }

    .amount-highlight {
        color: #e74c3c;
        font-size: 1.1rem;
    }

    .due-amount {
        color: #e74c3c;
        font-weight: 700;
    }

    .received-amount {
        color: #27ae60;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-reveal">
    <div class="bill-order-container">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title">
                <i class="fas fa-file-invoice me-3"></i>Bill Single Order
            </h2>
            <a href="{{ url_for('dashboard') }}" class="btn btn-light rounded-pill px-4">
                <i class="fas fa-home me-2"></i>Dashboard
            </a>
        </div>

        <!-- Search Section -->
        <div class="search-card">
            <h4 class="mb-3">
                <i class="fas fa-search me-2"></i>Search & Filter Orders
            </h4>
            <div class="search-filters">
                <input type="text" id="searchInput" class="form-control" placeholder="Receipt No. or Receiver Name..." autocomplete="off">
                
                <select id="orderTypeFilter" class="form-control">
                    <option value="all">All Types</option>
                    <option value="client">Client Orders</option>
                    <option value="walkin">Walk-in Orders</option>
                </select>

                <select id="paymentStatusFilter" class="form-control">
                    <option value="all">All Status</option>
                    <option value="unpaid">Unpaid</option>
                    <option value="partial">Partial Payment</option>
                    <option value="paid">Fully Paid</option>
                </select>

                <button class="btn-search" onclick="searchOrders()">
                    <i class="fas fa-search me-2"></i>Search
                </button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsContainer">
            <div class="no-results">
                <i class="fas fa-inbox"></i>
                <p>Enter search criteria to find orders</p>
            </div>
        </div>
    </div>
</div>

<script>
    function searchOrders() {
        const query = document.getElementById('searchInput').value;
        const orderType = document.getElementById('orderTypeFilter').value;
        const paymentStatus = document.getElementById('paymentStatusFilter').value;

        if (!query.trim()) {
            alert('Please enter a receipt number or receiver name');
            return;
        }

        const resultsContainer = document.getElementById('resultsContainer');
        resultsContainer.innerHTML = '<div class="loading"><div class="spinner-border" role="status"><span class="visually-hidden">Loading...</span></div></div>';

        fetch(`/api/search-orders-for-billing?query=${encodeURIComponent(query)}&type=${orderType}&status=${paymentStatus}`)
            .then(response => response.json())
            .then(data => {
                if (data.success && data.orders.length > 0) {
                    displayOrders(data.orders);
                } else {
                    resultsContainer.innerHTML = '<div class="no-results"><i class="fas fa-search"></i><p>No orders found matching your criteria</p></div>';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                resultsContainer.innerHTML = '<div class="alert alert-danger">Error searching orders. Please try again.</div>';
            });
    }

    function displayOrders(orders) {
        const resultsContainer = document.getElementById('resultsContainer');
        let html = '<div class="orders-grid">';

        orders.forEach(order => {
            const statusClass = `status-${order.status}`;
            const statusText = order.status.charAt(0).toUpperCase() + order.status.slice(1);
            const location = order.receiver_city ? `${order.receiver_city}` : 'N/A';
            
            html += `
                <div class="order-card">
                    <div class="order-card-header">
                        <h5>${order.receipt_number}</h5>
                        <div class="text-muted">${order.date}</div>
                    </div>
                    <div class="order-card-body">
                        <div class="order-detail">
                            <span class="detail-label">Receiver:</span>
                            <span class="detail-value">${order.receiver_name}</span>
                        </div>
                        <div class="order-detail">
                            <span class="detail-label">Location:</span>
                            <span class="detail-value">${location}</span>
                        </div>
                        <div class="order-detail">
                            <span class="detail-label">Type:</span>
                            <span class="detail-value">${order.order_type === 'client' ? 'Corporate' : 'Walk-in'}</span>
                        </div>
                        <div class="order-detail">
                            <span class="detail-label">Status:</span>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="amount-row">
                            <div class="order-detail">
                                <span class="detail-label">Amount:</span>
                                <span class="amount-highlight">₹${order.amount.toFixed(2)}</span>
                            </div>
                            ${order.received > 0 ? `
                            <div class="order-detail">
                                <span class="detail-label">Received:</span>
                                <span class="received-amount">₹${order.received.toFixed(2)}</span>
                            </div>
                            ` : ''}
                            <div class="order-detail">
                                <span class="detail-label">Due:</span>
                                <span class="due-amount">₹${order.due.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                    <div class="order-card-footer">
                        <a href="/order/${order.id}/bill" class="btn-bill">
                            <i class="fas fa-file-invoice"></i>View Bill
                        </a>
                    </div>
                </div>
            `;
        });

        html += '</div>';
        resultsContainer.innerHTML = html;
    }

    // Search on Enter key
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchOrders();
        }
    });
</script>
{% endblock %}
