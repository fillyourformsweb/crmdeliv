{% extends "base.html" %}

{% block title %}Add Receiver - {{ client.name }}{% endblock %}

{% block content %}
<div class="fitted-page-container">
    <div class="row mb-3">
        <div class="col">
            <h2 class="mb-0"><i class="fas fa-user-plus me-2 text-primary"></i>Add Receiver for {{ client.name }}</h2>
        </div>
    </div>

    <div class="card fitted-card">
        <div class="card-body">
            <form method="POST" class="fitted-form">
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label">Receiver Name *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Company Name</label>
                    <input type="text" name="company_name" class="form-control">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label">Phone *</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Alternate Phone</label>
                    <input type="text" name="alt_phone" class="form-control">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Alternate Email</label>
                    <input type="email" name="alt_email" class="form-control">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Alternate Address</label>
                    <textarea name="alt_address" class="form-control" rows="2"></textarea>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-2">
                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control">
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">State</label>
                    <input type="text" name="state" class="form-control">
                </div>
                <div class="col-md-3 mb-2">
                    <label class="form-label">Pincode *</label>
                    <input type="text" name="pincode" id="pincode" class="form-control" pattern="[0-9]{6}" minlength="6"
                        maxlength="6" inputmode="numeric" required>
                </div>
                <div class="col-md-9 mb-2">
                    <label class="form-label">Landmark</label>
                    <input type="text" name="landmark" class="form-control">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label">GST Number</label>
                    <input type="text" name="gst_number" class="form-control">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Bill Pattern</label>
                    <input type="text" name="bill_pattern" class="form-control">
                </div>
            </div>
            <div class="d-flex gap-2 mt-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i>Save Receiver
                </button>
                <a href="{{ url_for('client_details', id=client.id) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
