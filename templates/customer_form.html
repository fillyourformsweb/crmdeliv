<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Order - CRM Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4><i class="fas fa-truck"></i> Complete Your Order Details</h4>
                        <p class="mb-0">Receipt: {{ order.receipt_number }}</p>
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else category }}">
                            {{ message }}
                        </div>
                        {% endfor %}
                        {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <h5 class="mb-3">Receiver Information</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Receiver Name</label>
                                    <input type="text" name="receiver_name" class="form-control"
                                        value="{{ order.receiver_name or '' }}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Receiver Phone</label>
                                    <input type="text" name="receiver_phone" class="form-control"
                                        value="{{ order.receiver_phone or '' }}">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Receiver Address</label>
                                <textarea name="receiver_address" class="form-control"
                                    rows="2">{{ order.receiver_address or '' }}</textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">City</label>
                                    <input type="text" name="receiver_city" class="form-control"
                                        value="{{ order.receiver_city or '' }}">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">State</label>
                                    <input type="text" name="receiver_state" class="form-control"
                                        value="{{ order.receiver_state or '' }}">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Pincode</label>
                                    <input type="text" name="receiver_pincode" class="form-control"
                                        value="{{ order.receiver_pincode or '' }}" pattern="[0-9]{6}" minlength="6"
                                        maxlength="6" inputmode="numeric">
                                </div>
                            </div>

                            <h5 class="mb-3 mt-4">Package Information</h5>
                            <div class="mb-3">
                                <label class="form-label">Package Description</label>
                                <textarea name="package_description" class="form-control"
                                    rows="2">{{ order.package_description or '' }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Special Instructions</label>
                                <textarea name="special_instructions" class="form-control"
                                    rows="2">{{ order.special_instructions or '' }}</textarea>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                Submit Details
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
