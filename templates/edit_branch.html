{% extends "base.html" %}

{% block title %}Edit Branch - CRM Delivery{% endblock %}

{% block content %}
<div class="fitted-page-container">
    <div class="row mb-3 align-items-center">
        <div class="col-8">
            <h2 class="fw-black text-dark mb-0"><i class="fas fa-edit me-2 text-primary"></i>Edit Branch</h2>
        </div>
        <div class="col-4 text-end">
            <a href="{{ url_for('branches') }}" class="btn btn-light border px-3 py-1 small">
                <i class="fas fa-arrow-left me-1"></i>Back
            </a>
        </div>
    </div>

    <div class="card fitted-card">
        <div class="card-body p-3">
            <form method="POST" class="fitted-form">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Branch Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ branch.name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Branch Code *</label>
                    <input type="text" name="code" class="form-control" value="{{ branch.code }}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ branch.phone or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ branch.email or '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control" rows="2">{{ branch.address or '' }}</textarea>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {{ 'checked' if
                    branch.is_active else '' }}>
                <label class="form-check-label" for="isActive">Active</label>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4 py-2 fw-bold">
                    <i class="fas fa-save me-2"></i>Save Changes
                </button>
                <a href="{{ url_for('branches') }}" class="btn btn-light border px-4 py-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
