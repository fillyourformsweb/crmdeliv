{% extends "base.html" %}

{% block title %}Edit Receiver - {{ receiver.name }}{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2><i class="fas fa-user-edit me-2"></i>Edit Receiver: {{ receiver.name }}</h2>
    </div>
</div>

<div class="card luxury-card border-0 shadow-sm">
    <div class="card-body p-4">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Receiver Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ receiver.name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Company Name</label>
                    <input type="text" name="company_name" class="form-control"
                        value="{{ receiver.company_name or '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone *</label>
                    <input type="text" name="phone" class="form-control" value="{{ receiver.phone }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Alternate Phone</label>
                    <input type="text" name="alt_phone" class="form-control" value="{{ receiver.alt_phone or '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ receiver.email or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Alternate Email</label>
                    <input type="email" name="alt_email" class="form-control" value="{{ receiver.alt_email or '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2">{{ receiver.address or '' }}</textarea>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Alternate Address</label>
                    <textarea name="alt_address" class="form-control"
                        rows="2">{{ receiver.alt_address or '' }}</textarea>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control" value="{{ receiver.city or '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">State</label>
                    <input type="text" name="state" class="form-control" value="{{ receiver.state or '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Pincode</label>
                    <input type="text" name="pincode" class="form-control" value="{{ receiver.pincode or '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">GST Number</label>
                    <input type="text" name="gst_number" class="form-control" value="{{ receiver.gst_number or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Vill Pattern</label>
                    <input type="text" name="vill_pattern" class="form-control"
                        value="{{ receiver.vill_pattern or '' }}">
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i>Update Receiver
                </button>
                <a href="{{ url_for('client_details', id=receiver.client_id) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
